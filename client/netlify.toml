[build]
  # Directory to change to before starting build
  base = "client/"
  
  # Directory that contains the deploy-ready HTML files and assets
  publish = "build/"
  
  # Default build command
  command = "npm run build"

[build.environment]
  REACT_APP_API_URL = "https://saltrenewal.onrender.com/api"

# Redirect lightsaltcctv.com to saltcctv.com
[[redirects]]
  from = "https://lightsaltcctv.com/*"
  to = "https://www.saltcctv.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.lightsaltcctv.com/*"
  to = "https://www.saltcctv.com/:splat"
  status = 301
  force = true

# Redirect all requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
